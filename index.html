<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在冷白灯光下，偷听南半球的潮汐</title>
    <!-- 引入核心库 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;700&family=Noto+Sans+SC:wght@100;300;400;500&display=swap');
        
        body { 
            background-color: #fafaf9; 
            color: #1c1917; 
            font-family: 'Noto Sans SC', sans-serif; 
            -webkit-font-smoothing: antialiased; 
        }

        .serif-font { font-family: 'Noto Serif SC', serif; }
        
        .animate-fade-in { animation: fadeIn 1.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        p { margin-bottom: 2rem; line-height: 2.1; letter-spacing: 0.01em; }

        .hero-gradient { 
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 60%, rgba(0,0,0,0) 100%); 
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* 优化首字下沉 */
        .drop-cap::first-letter {
            float: left;
            font-size: 4rem;
            line-height: 0.8;
            margin: 0.1em 0.15em 0.1em 0;
            font-family: 'Noto Serif SC', serif;
            font-weight: 200;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 内置图标组件 ---
        const Wind = ({ size = 24, className = "" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>);
        const Heart = ({ size = 24, className = "" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>);
        const Sparkles = ({ size = 24, className = "" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>);
        const Anchor = ({ size = 24, className = "" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="5" r="3"/><path d="M12 22V8"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/></svg>);
        const Quote = ({ className = "" }) => (
            <svg className={className} width="40" height="40" viewBox="0 0 24 24" fill="currentColor" opacity="0.05"><path d="M14.017 21L14.017 18C14.017 16.899 14.916 16 16.017 16H19.017C19.568 16 20.017 15.551 20.017 15V9C20.017 8.449 19.568 8 19.017 8H16.017C15.466 8 15.017 8.449 15.017 9V12C15.017 12.551 14.568 13 14.017 13H11.017L11.017 21H14.017ZM5.017 21L5.017 18C5.017 16.899 5.916 16 7.017 16H10.017C10.568 16 11.017 15.551 11.017 15V9C11.017 8.449 10.568 8 10.017 8H7.017C6.466 8 6.017 8.449 6.017 9V12C6.017 12.551 5.568 13 5.017 13H2.017L2.017 21H5.017Z"/></svg>
        );

        const App = () => {
            return (
                <div className="min-h-screen selection:bg-blue-100">
                    
                    {/* Header */}
                    <header className="relative h-[80vh] bg-slate-900 flex items-end overflow-hidden">
                        <img 
                            src="https://images.unsplash.com/photo-1506973035872-a4ec16b8e8d9?auto=format&fit=crop&q=80&w=2070" 
                            className="absolute inset-0 w-full h-full object-cover opacity-70" 
                            alt="Sydney Harbor" 
                        />
                        <div className="absolute inset-0 hero-gradient"></div>
                        <div className="relative z-10 p-8 md:p-16 max-w-5xl mx-auto w-full text-white pb-24">
                            <p className="text-[10px] tracking-[0.5em] uppercase opacity-40 mb-6 flex items-center gap-3 animate-fade-in">
                                <Anchor size={12}/> Sydney · Archive · 2023-2025
                            </p>
                            <h1 className="text-4xl md:text-6xl font-extralight tracking-tight leading-tight animate-fade-in serif-font">
                                在冷白灯光下，<br/>偷听南半球的潮汐
                            </h1>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto px-6 py-24 space-y-24">
                        
                        {/* 卷首语 */}
                        <section className="relative py-8 text-center">
                            <Quote className="absolute top-0 left-1/2 -translate-x-1/2" />
                            <div className="max-w-xl mx-auto text-xl font-light text-slate-400 italic serif-font leading-relaxed">
                                “有些城市是用来路过的，而有些光阴是用来呼吸的。当二十四岁的身体被折叠进格子间的冷白灯光里，只有心跳还记得，那场永不落幕的风。”
                            </div>
                        </section>

                        {/* 笔者自序卡片 - 采用温暖的杏色底色 */}
                        <section className="bg-[#fefaf6] border border-orange-100 p-8 md:p-12 rounded-[2.5rem] shadow-xl shadow-orange-900/5 relative overflow-hidden group animate-fade-in">
                            <div className="absolute -top-6 -right-6 opacity-[0.03] group-hover:scale-110 transition-transform duration-700">
                                <Wind size={200} />
                            </div>
                            <div className="relative z-10">
                                <h2 className="text-[10px] tracking-[0.4em] uppercase text-orange-800/60 font-bold mb-8 flex items-center gap-2">
                                    <Wind size={14} className="text-orange-400" /> Preface · 笔者自序
                                </h2>
                                <div className="text-lg leading-loose text-slate-700 serif-font italic">
                                    回国后的日子，我常觉得自己像是在两个世界间泅泳：一边是悉尼那场怎么也吹不散的海风，一边是格子间里密不透风的规矩。写下这些，是为了在秩序的缝隙里，给那个曾经自由呼吸过的自己，找一个安放的出口。
                                </div>
                            </div>
                        </section>

                        {/* 正文第一部分 */}
                        <article className="text-lg text-slate-800 space-y-10 serif-font px-2">
                            <p className="drop-cap">我是在某个再普通不过的工作日里，突然想起悉尼的。办公室的灯白得发冷，电脑屏幕像一块持续发光的玻璃。人声、键盘声、走廊里不紧不慢的脚步声，混在一起，形成一种很难逃开的背景噪音。那一刻我没有发生什么大事，也没有被谁训斥，甚至连工作都算不上繁重，可我就是忽然觉得胸口被什么压了一下————不是疼，是闷。像你已经很努力在适应一种节奏，却还是被它轻轻推开，提醒你：你不属于这里。</p>
                            
                            <p>元旦假期一结束，家里几乎是把我“送”进了职场。实习期，没什么负担，听起来甚至轻松，可我越往里走越觉得难受。难受不是因为事情有多难，而是因为那些无处不在的形式、流程、规矩，它们像透明的墙，摸上去没有形状，却处处挡着你。你必须先经过一套仪式：确认、审批、递交、复核、汇报。你不得不把本来能直线到达的结果，绕成一圈又一圈，像在向某种看不见的权威证明：你配得上被允许完成它。</p>
                            
                            <p className="bg-blue-50/30 p-10 rounded-[2.5rem] italic text-slate-600 border-l border-blue-100 shadow-sm leading-relaxed text-lg">我受不了这种强制的枷锁。每当那种无形的压迫感落下来，我就会下意识地想起悉尼————想起那两年看似“虚度”、却在我二十四年人生里最值得怀念的光阴。</p>
                        </article>

                        {/* 核心主旨卡片 - 采用清新的海波蓝 */}
                        <section className="bg-[#f0f9ff] border border-blue-100 p-8 md:p-12 rounded-[2.5rem] shadow-xl shadow-blue-900/5 relative overflow-hidden group animate-fade-in">
                            <div className="absolute -top-10 -right-10 opacity-[0.05] group-hover:rotate-12 transition-transform duration-1000">
                                <Sparkles size={220} />
                            </div>
                            <div className="relative z-10">
                                <h2 className="text-[10px] tracking-[0.4em] uppercase text-blue-600/60 font-bold mb-8 flex items-center gap-2">
                                    <Sparkles size={14} className="text-blue-400" /> Core Theme · 核心主旨
                                </h2>
                                <div className="text-lg leading-loose text-slate-700 serif-font">
                                    文章通过“海风”与“规矩”的张力，探讨了居住环境如何作为情绪的托底，以及在二十四岁这一生命阶段，对自由状态最诚实的缅怀。悉尼代表着“顺畅呼吸”，而国内职场则是“形式枷锁”的代名词。
                                </div>
                            </div>
                        </section>

                        <article className="text-lg text-slate-800 space-y-10 serif-font px-2">
                            <p>悉尼的天空总是很开阔。云在很高的地方慢慢移动，光线不急不躁地铺在街道上，风从海那边来，带着一点盐和一点凉。那时我并没有把这一切叫作“幸福”，我只是觉得日子是顺的——呼吸是顺的，心是松的。你不必时时刻刻解释自己在做什么，也不必把每一个选择都包装成“正确的决定”。在那里，时间更像是属于你的。您可以慢一点，允许自己晚起，允许自己走神，允许自己把一个下午浪费在海边的台阶上，只是看浪一层层推过来。你不必急着成为一个“有用的人”。你只是一个活着的人。</p>

                            <h3 className="text-[10px] tracking-[0.4em] text-slate-300 uppercase mb-12 border-b border-slate-100 pb-4">Chapter II · 栖居之底气</h3>
                            <p>而在这段自由里，有一件事对我来说格外重要：住处。我对住所的执着源于我对底气的购买。差别很难用指标讲清楚。它更像一种长期的、细小的、却会在你情绪低落时托住你的东西。那种差别来自你回到家推开门的瞬间————空气是不是干净、光线是不是舒服、隔音是不是让你可以安静地把自己放下；来自你睡醒后不需要先忍受什么，才开始新的一天。</p>
                            
                            <p>我在悉尼的租房经历，像一条慢慢上升的曲线。2023年10月18日，我抵达悉尼。那时什么都急。我在短租的房里住次卧，和室友共用卫生间。这种生活边界被迫重叠的感觉，会在每天的细节里提醒你：你还只是暂时借住。后来我相中了一间市中心的公寓。我站在那里的时候，心里会出现一种直接的念头——我想住在这里。缺点很直白：比很多选择贵出一截。可有些喜欢是压不住的。我就是在那一年里，慢慢变得很“安”。那种安是一种稳定的底气。门一关上，城市像被隔在玻璃之外。你会觉得自己被收纳得很好。</p>
                            
                            <p>后来室友准备换房，新的公寓在海港附近，名字听起来就带着一种锋利的光。当你真的走进去，你又不得不承认：大堂的气味、公共空间的秩序感、健身房与泳池的质感，连安静都像是被设计出来的。你突然明白：原来生活可以被照顾到这种程度。</p>
                        </article>

                        {/* 笔者侧写卡片 - 保持深色对比，作为视觉重音 */}
                        <section className="bg-slate-900 text-white p-10 md:p-14 rounded-[3rem] shadow-2xl relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-8 opacity-10">
                                <Heart size={120} />
                            </div>
                            <div className="max-w-xl relative z-10">
                                <h2 className="text-[10px] tracking-[0.4em] uppercase text-blue-400 font-bold mb-8 flex items-center gap-2">
                                    <Heart size={14} /> Side Note · 生活侧写
                                </h2>
                                <div className="text-xl font-extralight leading-relaxed serif-font space-y-8 opacity-90">
                                    <p>我执着于在“住”上花掉生活费的大头。那不是为了标签，而是为了在动荡的迁徙里，买回一点点对日常的掌控。哪怕环境无法替你取消痛楚，但它能让你在痛的时候，依然拥有体面。</p>
                                </div>
                            </div>
                        </section>

                        <article className="text-lg text-slate-800 space-y-10 serif-font px-2">
                            <p>毕业之后，我飞往香港。前三晚我住在一家廉价酒店。楼老、走廊昏。住在那样的地方，你会明显感觉到它只负责提供“过夜”，不负责让你“生活”。后两晚我换到一家五星级酒店。入住那一刻，窗帘合上的声音都更轻。你会突然明白，住得好不是为了炫耀，而是一种被妥帖照顾的感觉——你不用费力，事情就能顺利地发生。</p>
                            
                            <p>可人生偏偏很会开玩笑。前三天玩得很尽兴，迪士尼那天更是走到腿软，像把快乐一次性透支。然后甲沟炎复发了，痛得要命。流血、肿胀，走一步都像在跟自己讨价还价。于是最后两天，我几乎没有机会去享受配套。那几天让我清楚意识到：我们愿意在“住”上花钱，买的是一种可能性——一种让你更容易恢复、更容易把自己安放好的可能性。而当身体不给面子的时候，再好的环境也只能把疼痛放得更安静一点，无法替你把疼痛取消。</p>
                            
                            <p>真正回到熟悉的土地时，落地并不等于安稳。元旦一结束，我被催着去上班。那种压抑又回来了————比想象中更快、更密、更日常。某些时刻，我脑子里会跳出一个词：weird。这是一种真实的错位感。像你刚从海风里走回来，身上还带着那边的空气。下班路上，我会想起悉尼。想起傍晚的电车，想起那时候的我不需要时刻证明自己“在正确的轨道上”。</p>
                            
                            <p className="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-50 italic text-slate-700 leading-relaxed text-lg">现在的生活却像被放进一套结构分明的框架里，时间被整齐切割。那种疲惫不猛烈，却很持久。在悉尼的两年，从结果上看也许并不耀眼，但它真实得发亮。那两年，也许不是我人生最重要的阶段。但它很可能，是我最能呼吸的一段时间。</p>
                        </article>

                        {/* 海风的回响卡片 - 采用深邃的渐变底色，信笺感 */}
                        <section className="relative py-8 group">
                            <div className="absolute inset-0 bg-gradient-to-tr from-blue-600/10 via-cyan-400/5 to-transparent rounded-[4rem] transition-transform duration-700"></div>
                            <div className="relative z-10 p-10 md:p-14 text-center space-y-12">
                                <div className="space-y-4">
                                    <div className="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto shadow-xl mb-6 group-hover:scale-105 transition-transform">
                                        <Wind className="text-blue-500" />
                                    </div>
                                    <h3 className="text-3xl font-light text-slate-900 tracking-[0.3em] uppercase">海风的回响</h3>
                                </div>
                                
                                <div className="max-w-xl mx-auto text-xl leading-relaxed text-slate-600 serif-font italic text-left bg-white/80 p-10 rounded-[2.5rem] glass-card shadow-lg relative border-white/80">
                                    <Quote className="absolute -top-4 left-6" />
                                    请记得，你曾经那样自然地呼吸过。此刻格子间的灯光虽冷，但灵魂里那场咸湿的海风，永远不会停。✨
                                </div>
                            </div>
                        </section>

                        {/* Footer */}
                        <footer className="pt-24 text-center opacity-20">
                            <div className="h-px w-16 bg-slate-400 mx-auto mb-8"></div>
                            <p className="text-[10px] tracking-[0.5em] uppercase font-bold text-slate-500">
                                Sydney Archive · 2023-2025
                            </p>
                        </footer>

                    </main>

                    {/* 极简返回顶部 */}
                    <div className="fixed bottom-10 left-10">
                        <button 
                            onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})}
                            className="w-10 h-10 rounded-full bg-white/50 backdrop-blur-md shadow flex items-center justify-center text-slate-300 hover:text-blue-500 transition-all border border-white/50"
                        >
                            <Anchor size={14} />
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
